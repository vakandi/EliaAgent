<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EliaUI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&display=swap');

  :root {
    --cyan:   #00e5ff;
    --cyan2:  #00b8d4;
    --cyan3:  #006064;
    --red:    #ff1744;
    --green:  #00e676;
    --yellow: #ffea00;
    --bg:     rgba(0,10,20,0.0);
    --glow:   0 0 20px rgba(0,229,255,0.6), 0 0 60px rgba(0,229,255,0.2);
    --glow2:  0 0 8px rgba(0,229,255,0.9);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width: 350px; height: 250px;
    background: transparent;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
    color: var(--cyan);
    user-select: none;
    -webkit-app-region: no-drag; /* Make everything non-draggable by default */
  }

  /* ── Root container ──
     Hit-test: only #orb-close-row is non-transparent so only orb + close receive clicks;
     rest of window is click-through (setIgnoreMouseEvents(true, { forward: true })). */
  #app {
    width: 350px; height: 250px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 1.2s ease;
    pointer-events: none;
  }
  #app.visible { opacity: 1; }

  /* Only orb, close, and the two cards draw as opaque; rest is click-through for hit-test */
  #app.visible #conn-dot,
  #app.visible .scan-line,
  #app.visible #notif-container {
    opacity: 0;
    pointer-events: none;
  }
  #app.visible #orb-close-row,
  #app.visible #context-status-row {
    opacity: 1;
    pointer-events: auto;
  }

  #orb-core { 
    -webkit-app-region: no-drag; 
    cursor: pointer; 
    pointer-events: all; /* Enable clicks on orb */
  }

  /* Orb + close button row: circle centered */
  #orb-close-row {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    pointer-events: none;
    width: fit-content;
  }

  #orb-close-row .mini-orb,
  #orb-close-row .logs-btn {
    pointer-events: auto;
  }

  #orb-wrapper {
    flex-shrink: 0;
    margin-left: -35px;
    pointer-events: auto;
    cursor: pointer;
    z-index: 200;
  }

  /* Right side controls - positioned to the right of the orb */
  #right-controls {
    position: absolute;
    right: -90px;
    top: 50%;
    transform: translateY(-60%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    z-index: 200;
    pointer-events: auto;
  }
   
  #right-controls > * {
    pointer-events: auto;
  }

  /* CRON toggle - right below close button */
  #right-controls .cron-toggle {
    margin-top: -14px;
  }
  /* OMO toggle */
  #right-controls .omo-toggle {
    margin-top: 2px;
  }
  /* RALPH toggle */
  #right-controls .ralph-toggle {
    margin-top: 2px;
  }

  /* Logs button - same style as toggle but without switch */
  .logs-btn {
    width: 40px;
    height: 20px;
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.4);
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    pointer-events: auto;
    -webkit-app-region: no-drag;
  }
  .logs-btn:hover {
    background: rgba(0,229,255,0.25);
    border-color: rgba(0,229,255,0.7);
    box-shadow: 0 0 10px rgba(0,229,255,0.4);
  }
  .logs-btn span {
    color: var(--cyan);
    font-size: 7px;
    font-family: 'Orbitron', monospace;
    letter-spacing: 0.5px;
  }

  .mini-orb {
    position: absolute;
    bottom: 26px;
    left: -32px;
    width: 28px;
    height: 28px;
    cursor: pointer;
    z-index: 351;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: all;
  }
  .mini-orb-core {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00e5ff 0%, #6c5ce7 50%, #a855f7 100%);
    background-size: 200% 200%;
    box-shadow: 0 0 6px rgba(168,85,247,0.5), inset 0 0 2px rgba(0,0,0,0.3);
    animation: pulse-mini-orb 3s ease-in-out infinite, gradient-shift 4s ease-in-out infinite;
    z-index: 2;
  }
  .mini-orb-ring-1 {
    position: absolute;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid transparent;
    border-top-color: var(--cyan2);
    border-right-color: var(--cyan2);
    animation: spin 6s linear infinite;
  }
  .mini-orb-ring-2 {
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px solid transparent;
    border-bottom-color: var(--cyan);
    border-left-color: var(--cyan);
    animation: spin 4s linear infinite reverse;
  }
  .mini-orb:hover .mini-orb-core {
    background: linear-gradient(135deg, #67e8f9 0%, #8b5cf6 50%, #c084fc 100%);
    background-size: 200% 200%;
    box-shadow: 0 0 10px rgba(168,85,247,0.7), 0 0 15px rgba(139,92,246,0.5);
  }
  @keyframes pulse-mini-orb {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.05); opacity: 1; }
  }
  @keyframes gradient-shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ── Close btn: elia_banner image with enchanted glow behind ── */
  #btn-close {
    width: 120px; height: 50px;
    cursor: pointer;
    z-index: 50;
    position: relative;
    transition: transform 0.2s;
    -webkit-app-region: no-drag;
    pointer-events: auto;
    background: transparent;
    overflow: hidden;
    background-image: url('../imgs/elia_banner.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    border: none;
    outline: none;
  }

  /* Glow is purely visual, behind the image, fully contained */
  #btn-close::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 130px;
    height: 65px;
    background: radial-gradient(ellipse at center,
      rgba(0, 150, 255, 0.4) 0%,
      rgba(0, 100, 255, 0.2) 40%,
      transparent 70%
    );
    border-radius: 6px;
    animation: enchantedGlow 1.5s ease-in-out infinite;
    z-index: -1;
    pointer-events: none;
  }

  @keyframes enchantedGlow {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  #btn-close:hover {
    transform: scale(1.05);
  }

  /* Menu items - top (unused, keep for any legacy) */
  .menu-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 4px;
    pointer-events: none; /* Disable clicks on menu list */
  }
  .menu-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 8px;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--cyan2);
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
    pointer-events: none; /* Disable clicks on menu items */
  }
  .menu-item::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--cyan3);
    border: 1px solid var(--cyan2);
    flex-shrink: 0;
    transition: all 0.2s;
    pointer-events: none; /* Disable clicks on menu item dots */
  }
  .menu-item:hover {
    color: var(--cyan);
    border-left-color: var(--cyan);
    text-shadow: var(--glow2);
    pointer-events: none; /* Disable clicks on hover states */
  }
  .menu-item:hover::before {
    background: var(--cyan);
    box-shadow: var(--glow2);
    pointer-events: none; /* Disable clicks on hover pseudo-elements */
  }

  /* Submenu dropdown */
  .submenu {
    display: none;
    flex-direction: column;
    gap: 1px;
    margin-left: 22px;
    margin-top: 2px;
    pointer-events: none; /* Disable clicks on submenu */
  }
  .submenu.open { display: flex; pointer-events: none; /* Disable clicks on open submenu */ }
  .submenu-item {
    font-size: 9px;
    color: var(--cyan3);
    letter-spacing: 1px;
    padding: 2px 6px;
    cursor: pointer;
    transition: color 0.15s;
    pointer-events: none; /* Disable clicks on submenu items */
  }
  .submenu-item:hover { color: var(--cyan); pointer-events: none; /* Disable clicks on hover states */ }

  /* ═══════════════════════════════════════
     ORBE CENTRALE (larger for bigger GIF)
  ═══════════════════════════════════════ */
  #orb-wrapper {
    position: relative;
    width: 90px; height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
    overflow: hidden;
    cursor: pointer;
    pointer-events: all; /* whole orb area (circle + animation) is clickable */
  }

  /* Cercles tournants */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid transparent;
    pointer-events: none; /* Disable clicks on rings */
  }
  .ring-1 {
    width: 88px; height: 88px;
    border-top-color: var(--cyan2);
    border-right-color: var(--cyan2);
    animation: spin 8s linear infinite;
    box-shadow: 0 0 4px var(--cyan2);
    pointer-events: none; /* Disable clicks on ring variants */
  }
  .ring-2 {
    width: 78px; height: 78px;
    border-bottom-color: var(--cyan);
    border-left-color: var(--cyan);
    animation: spin 5s linear infinite reverse;
    pointer-events: none; /* Disable clicks on ring variants */
  }
  .ring-3 {
    width: 70px; height: 70px;
    border: 1px dashed rgba(0,229,255,0.3);
    animation: spin 12s linear infinite;
    pointer-events: none; /* Disable clicks on ring variants */
  }

  /* Arc rouge (accent) */
  .ring-red {
    position: absolute;
    width: 82px; height: 82px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: var(--red);
    border-right-color: var(--red);
    animation: spin 3s linear infinite;
    box-shadow: 0 0 6px var(--red);
    opacity: 0.8;
    pointer-events: none; /* Disable clicks on red ring */
  }

  /* Graduations */
  .ticks {
    position: absolute;
    width: 88px; height: 88px;
    pointer-events: none; /* Disable clicks on ticks */
  }
  .tick {
    position: absolute;
    top: 50%; left: 50%;
    width: 1px;
    background: var(--cyan3);
    transform-origin: bottom center;
    pointer-events: none; /* Disable clicks on ticks */
  }
  .tick.major { height: 4px; background: var(--cyan2); pointer-events: none; /* Disable clicks on tick variants */ }
  .tick.minor { height: 2px; pointer-events: none; /* Disable clicks on tick variants */ }

  /* Sphère centrale (larger): circular crop for GIF */
  #orb-core {
    position: relative;
    width: 44px; height: 44px;
    border-radius: 50%;
    overflow: hidden;
    background: radial-gradient(circle at 35% 35%,
      #80deea 0%,
      #00b8d4 25%,
      #006064 55%,
      #002b33 80%,
      #001a22 100%);
    box-shadow: inset 0 0 6px rgba(0,0,0,0.5);
    animation: pulse-orb 3s ease-in-out infinite;
    z-index: 10;
  }
  #orb-core::before {
    content: '';
    position: absolute;
    inset: -15px;
    border-radius: 50%;
    background: radial-gradient(circle at center, transparent 30%, rgba(0,229,255,0.8) 40%, transparent 70%);
    animation: pulse-idle-glow 3s ease-in-out infinite;
    pointer-events: none;
    z-index: -1;
  }
  #orb-core .orb-gif {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: block;
    pointer-events: none;
  }

  /* Reflets (over GIF when idle) */
  #orb-core::before {
    content: '';
    position: absolute;
    top: 3px; left: 5px;
    width: 8px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    filter: blur(1px);
    transform: rotate(-30deg);
  }
  #orb-core::after {
    content: '';
    position: absolute;
    bottom: 5px; right: 4px;
    width: 4px; height: 3px;
    border-radius: 50%;
    background: rgba(0,229,255,0.2);
    filter: blur(1px);
  }

  /* Segments (hidden so GIF is fully visible) */
  .orb-segment {
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50%;
    border: 1px solid rgba(0,229,255,0.08);
    pointer-events: none;
  }
  .orb-segment:nth-child(2) { transform: rotate(45deg); }
  .orb-segment:nth-child(3) { transform: rotate(-45deg); }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse-idle-glow {
    0%, 100% { 
      opacity: 0.7; 
      transform: scale(1);
    }
    50% { 
      opacity: 1; 
      transform: scale(1.05);
    }
  }
  @keyframes pulse-orb {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.02); }
  }

  /* Points décoratifs sur l'orbe */
  .orb-dot {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 3px var(--cyan);
    pointer-events: none; /* Disable clicks on decorative dots */
  }

  /* ── Orb states: recording (red), transcribing (amber), agent (green) ── */
  #orb-wrapper.state-recording .ring,
  #orb-wrapper.state-recording .ring-red,
  #orb-wrapper.state-recording .ticks { opacity: 0.2; }
  #orb-wrapper.state-recording #orb-core { animation: none; }
  #orb-core.state-recording {
    background: radial-gradient(circle at 35% 35%,
      #ff8a80 0%, #ff1744 30%, #b71c1c 60%, #4a0e0e 100%);
    box-shadow: inset 0 0 12px rgba(0,0,0,0.5);
    border-radius: 50%;
    pointer-events: all; /* Enable clicks on orb states */
  }
  #orb-core.state-recording::before {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle at center, transparent 30%, rgba(255,23,68,0.9) 40%, transparent 70%);
    animation: pulse-recording-glow 1.2s ease-in-out infinite;
    pointer-events: none;
    z-index: -1;
  }
  #orb-core.state-transcribing {
    background: radial-gradient(circle at 35% 35%,
      #ffe082 0%, #ffc107 30%, #ff8f00 60%, #e65100 100%);
    box-shadow: inset 0 0 12px rgba(0,0,0,0.5);
    border-radius: 50%;
    pointer-events: all; /* Enable clicks on orb states */
  }
  #orb-core.state-transcribing::before {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle at center, transparent 30%, rgba(255,193,7,0.9) 40%, transparent 70%);
    animation: pulse-transcribing-glow 1.2s ease-in-out infinite;
    pointer-events: none;
    z-index: -1;
  }
  #orb-core.state-agent {
    background: radial-gradient(circle at 35% 35%,
      #b9f6ca 0%, #00e676 30%, #00c853 60%, #1b5e20 100%);
    box-shadow: inset 0 0 12px rgba(0,0,0,0.5);
    border-radius: 50%;
    pointer-events: all; /* Enable clicks on orb states */
  }
  #orb-core.state-agent::before {
    content: '';
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle at center, transparent 30%, rgba(0,230,118,0.9) 40%, transparent 70%);
    animation: pulse-agent-glow 2s ease-in-out infinite;
    pointer-events: none;
    z-index: -1;
  }
  @keyframes pulse-recording-glow {
    0%, 100% { 
      opacity: 0.8; 
      transform: scale(1);
    }
    50% { 
      opacity: 1; 
      transform: scale(1.1);
    }
  }
  @keyframes pulse-transcribing-glow {
    0%, 100% { 
      opacity: 0.8; 
      transform: scale(1);
    }
    50% { 
      opacity: 1; 
      transform: scale(1.1);
    }
  }
  @keyframes pulse-agent-glow {
    0%, 100% { 
      opacity: 0.8; 
      transform: scale(1);
    }
    50% { 
      opacity: 1; 
      transform: scale(1.1);
    }
  }

  /* ═════ Baroque gyroscope: same box as orb (overflow hidden on wrapper) ─════ */
  #orb-gyro {
    position: absolute;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  #orb-wrapper.state-recording #orb-gyro { opacity: 1; }
  .gyro-ring {
    position: absolute;
    left: 50%; top: 50%;
    border-radius: 50%;
    border: 1px solid rgba(255,23,68,0.9);
    box-shadow: 0 0 6px rgba(255,23,68,0.5), inset 0 0 4px rgba(255,23,68,0.15);
    transform: translate(-50%, -50%);
    pointer-events: none; /* Disable clicks on gyro rings */
  }
  .gyro-ring::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 1px solid rgba(255,138,128,0.5);
    pointer-events: none; /* Disable clicks on gyro ring pseudo-elements */
  }
  .gyro-ring.g1 { width: 88px; height: 88px; animation: gyro-spin 4s linear infinite; pointer-events: none; /* Disable clicks on gyro variants */ }
  .gyro-ring.g2 { width: 78px; height: 78px; border-style: double; border-width: 2px; animation: gyro-spin 5s linear infinite reverse; pointer-events: none; /* Disable clicks on gyro variants */ }
  .gyro-ring.g3 { width: 82px; height: 45px; border-radius: 50%; animation: gyro-spin 6s linear infinite; pointer-events: none; /* Disable clicks on gyro variants */ }
  .gyro-ring.g4 { width: 72px; height: 72px; border-style: dashed; animation: gyro-spin 3s linear infinite reverse; pointer-events: none; /* Disable clicks on gyro variants */ }
  .gyro-ring.g5 { width: 90px; height: 90px; border-width: 1px; opacity: 0.7; animation: gyro-spin 8s linear infinite; pointer-events: none; /* Disable clicks on gyro variants */ }
  .gyro-ring.g6 { width: 62px; height: 62px; border-style: double; animation: gyro-spin 2.5s linear infinite reverse; pointer-events: none; /* Disable clicks on gyro variants */ }
  .gyro-ring.g7 { width: 80px; height: 50px; animation: gyro-spin 5.5s linear infinite; pointer-events: none; /* Disable clicks on gyro variants */ }
  .gyro-ring.g8 { width: 68px; height: 68px; border-style: dotted; animation: gyro-spin 4.5s linear infinite reverse; pointer-events: none; /* Disable clicks on gyro variants */ }
  @keyframes gyro-spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
  .gyro-ring.g2::before { display: none; }

  /* Transcribing: spiral / wave rings (visible in state-transcribing) */
  #orb-wrapper.state-transcribing #orb-gyro .gyro-ring { border-color: rgba(255,193,7,0.85); box-shadow: 0 0 10px rgba(255,152,0,0.5); }
  #orb-wrapper.state-transcribing #orb-gyro .gyro-ring.g1 { animation: gyro-spin 3s linear infinite; }
  #orb-wrapper.state-transcribing #orb-gyro .gyro-ring.g2 { animation: gyro-spin 4s linear infinite reverse; }
  #orb-wrapper.state-transcribing #orb-gyro .gyro-ring.g3 { animation: gyro-spin 5s linear infinite; }
  #orb-wrapper.state-transcribing #orb-gyro .gyro-ring.g4 { animation: gyro-spin 2s linear infinite reverse; }
  #orb-wrapper.state-transcribing #orb-gyro .gyro-ring.g5 { animation: gyro-spin 6s linear infinite; }
  #orb-wrapper.state-transcribing #orb-gyro .gyro-ring.g6 { animation: gyro-spin 2s linear infinite reverse; }
  #orb-wrapper.state-transcribing #orb-gyro .gyro-ring.g7 { animation: gyro-spin 4s linear infinite; }
  #orb-wrapper.state-transcribing #orb-gyro .gyro-ring.g8 { animation: gyro-spin 3s linear infinite reverse; }
  #orb-wrapper.state-transcribing #orb-gyro { opacity: 0.85; }

  /* Agent working: green gyro (visible in state-agent) */
  #orb-wrapper.state-agent #orb-gyro .gyro-ring { border-color: rgba(0,230,118,0.8); box-shadow: 0 0 10px rgba(0,200,83,0.5); }
  #orb-wrapper.state-agent #orb-gyro { opacity: 0.7; }

  /* ═══════════════════════════════════════
     CONTEXT + STATUS CARDS (below orb, compact)
  ═══════════════════════════════════════ */
  #context-status-row {
    display: flex;
    justify-content: flex-start;
    gap: 6px;
    margin-top: 2px;
    padding-left: 25px;
    pointer-events: auto;
    width: fit-content;
  }
  .context-status-card {
    flex: 1;
    max-width: 88px;
    padding: 3px 5px;
    border: 1px solid var(--cyan3);
    border-radius: 4px;
    background: rgba(0,229,255,0.35);
    pointer-events: all;
  }
  .context-status-card .card-title {
    font-size: 6px;
    letter-spacing: 1px;
    color: white;
    margin-bottom: 2px;
    -webkit-app-region: drag;
    cursor: grab;
    pointer-events: auto;
  }
  .context-status-card:active .card-title { cursor: grabbing; }
  .context-status-card .card-badge {
    font-family: 'Orbitron', monospace;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 1px 4px;
    border-radius: 3px;
    display: inline-block;
    pointer-events: none; /* Disable clicks on card badges */
  }
  .card-badge.running {
    background: rgba(0,230,118,0.2);
    border: 1px solid var(--green);
    color: var(--green);
    box-shadow: 0 0 8px rgba(0,230,118,0.4);
    pointer-events: none; /* Disable clicks on badge states */
  }
  .card-badge.stopped {
    background: rgba(255,23,68,0.1);
    border: 1px solid var(--red);
    color: var(--red);
    pointer-events: none; /* Disable clicks on badge states */
  }
  .card-badge.context {
    background: rgba(0,184,212,0.15);
    border: 1px solid var(--cyan2);
    color: var(--cyan);
    pointer-events: none; /* Disable clicks on badge states */
  }

  /* Model badges - must be no-drag so clicks register, not window drag */
  .model-badge {
    font-family: 'Orbitron', monospace;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.5px;

<body>

<script>
// ── Model selection ─────────────────────────────────────
let selectedModel = 'minimax'; // Default model

function selectModel(model) {
  console.log('selectModel called with:', model);
  selectedModel = model;
  
  const modelInfo = {
    'big-pickle': { context: '200K', tokens: '200K' },
    'nvidia': { context: '128K', tokens: '128K' },
    'minimax': { context: '1M', tokens: '1M' }
  };
  const info = modelInfo[model] || { context: '—', tokens: '—' };
  
  const ctxBadge = document.getElementById('model-context');
  const tokBadge = document.getElementById('model-tokens');
  if (ctxBadge) ctxBadge.textContent = 'Ctx: ' + info.context;
  if (tokBadge) tokBadge.textContent = 'Max: ' + info.tokens;
  
  const debugText = document.getElementById('debug-text');
  if (debugText) {
    debugText.textContent = 'Selected: ' + model;
    debugText.style.color = model === 'big-pickle' ? '#ff6b6b' : 
                                   model === 'nvidia' ? '#4caf50' : 
                                   '#ffc107';
  }
  
  document.querySelectorAll('.model-badge').forEach(badge => {
    badge.classList.remove('selected');
  });
  
  const selectedBadge = document.querySelector('[data-model="' + model + '"]');
  if (selectedBadge) {
    selectedBadge.classList.add('selected');
    console.log('Badge selected:', selectedBadge);
  }
  
  localStorage.setItem('selectedModel', model);
  window.jarvis?.saveModelForCron?.(model);
}

function loadSelectedModel() {
  const saved = localStorage.getItem('selectedModel');
  if (saved) {
    selectModel(saved);
  }
}

// OMO & RALPH/ULW Toggles
// ULW is now the DEFAULT mode
let omoEnabled = true;
let ulwMode = true;

function toggleOmo() {
  omoEnabled = !omoEnabled;
  const toggle = document.getElementById('omo-toggle');
  if (omoEnabled) {
    toggle.classList.add('enabled');
  } else {
    toggle.classList.remove('enabled');
  }
  localStorage.setItem('omoEnabled', omoEnabled);
  window.jarvis?.onOmoToggle?.(omoEnabled);
  if (window.electronAPI) {
    window.electronAPI.send('omo-toggle', omoEnabled);
  }
  console.log('OMO toggled:', omoEnabled);
}

function toggleRalphUlw() {
  ulwMode = !ulwMode;
  const toggle = document.getElementById('ralph-toggle');
  const label = document.getElementById('ralph-ulw-label');
  if (ulwMode) {
    toggle.classList.add('ulw-mode');
    label.textContent = 'ULW';
  } else {
    toggle.classList.remove('ulw-mode');
    label.textContent = 'RALPH';
  }
  localStorage.setItem('ulwMode', ulwMode);
  window.jarvis?.onUlwToggle?.(ulwMode);
  if (window.electronAPI) {
    window.electronAPI.send('ulw-toggle', ulwMode);
  }
  console.log('RALPH/ULW toggled:', ulwMode);
}

function loadToggleStates() {
  const savedOmo = localStorage.getItem('omoEnabled');
  if (savedOmo !== null) {
    omoEnabled = savedOmo === 'true';
    const toggle = document.getElementById('omo-toggle');
    if (omoEnabled) {
      toggle.classList.add('enabled');
    } else {
      toggle.classList.remove('enabled');
    }
  } else {
    document.getElementById('omo-toggle').classList.add('enabled');
  }

  const savedUlw = localStorage.getItem('ulwMode');
  if (savedUlw !== null) {
    ulwMode = savedUlw === 'true';
    const toggle = document.getElementById('ralph-toggle');
    const label = document.getElementById('ralph-ulw-label');
    if (ulwMode) {
      toggle.classList.add('ulw-mode');
      label.textContent = 'ULW';
    } else {

  const savedCron = localStorage.getItem('cronEnabled');
  if (savedCron !== null) {
    cronEnabled = savedCron === 'true';
    const toggle = document.getElementById('cron-toggle');
    if (cronEnabled) {
      toggle.classList.add('enabled');
    } else {
      toggle.classList.remove('enabled');
    }
  }

  const savedPeriod = localStorage.getItem('cronPeriod');
  if (savedPeriod) {
    selectPeriodBadge(savedPeriod);
  }
}

// CRON Toggle

<script>
// ── Generate ticks ───────────────────────────────────────────
(function() {
  const container = document.getElementById('ticks');
  if (!container) return;
  const r = 42; // radius for 88px ring
  for (let i = 0; i < 72; i++) {
    const angle = (i / 72) * 360;
    const isMajor = i % 6 === 0;
    const tick = document.createElement('div');
    tick.className = 'tick ' + (isMajor ? 'major' : 'minor');
    const h = isMajor ? 4 : 2;
    tick.style.cssText = `
      height: ${h}px;
      transform: rotate(${angle}deg) translateX(-50%) translateY(-${r}px);
    `;
    container.appendChild(tick);
  }
})();

// ── Config rendering ─────────────────────────────────────────
function renderConfig(config) {
  if (!config) return;
}

// ── Orb state: idle | recording | transcribing | agent_working ──
const ORB_RECORDING_SEC = 22;
const ORB_TRANSCRIBING_SEC = 18;
let orbState = 'idle';
let recordingTimer = null;
let transcribingTimer = null;

function clearOrbTimers() {
  if (recordingTimer) { clearTimeout(recordingTimer); recordingTimer = null; }
  if (transcribingTimer) { clearTimeout(transcribingTimer); transcribingTimer = null; }
}

function setOrbState(state) {
  orbState = state;
  const wrapper = document.getElementById('orb-wrapper');
  const core = document.getElementById('orb-core');
  // Remove context badge reference since we now have MODELS card
  if (!wrapper || !core) return;
  wrapper.classList.remove('state-recording', 'state-transcribing', 'state-agent');
  core.classList.remove('state-recording', 'state-transcribing', 'state-agent');
  if (state === 'recording') {
    wrapper.classList.add('state-recording');
    core.classList.add('state-recording');
  } else if (state === 'transcribing') {
    wrapper.classList.add('state-transcribing');
    core.classList.add('state-transcribing');
  } else if (state === 'agent_working') {
    wrapper.classList.add('state-agent');
    core.classList.add('state-agent');
  }
}

function startRecordingPhase() {
  clearOrbTimers();
  setOrbState('recording');
  recordingTimer = setTimeout(() => {
    recordingTimer = null;
    setOrbState('transcribing');
    transcribingTimer = setTimeout(() => {
      transcribingTimer = null;
      if (orbState === 'transcribing') setOrbState('idle');
    }, ORB_TRANSCRIBING_SEC * 1000);
  }, ORB_RECORDING_SEC * 1000);
}

function stopRecordingAndGoIdle() {
  clearOrbTimers();
  setOrbState('idle');
  window.jarvis?.stopRecording();
}

// ── Agent status badge + orb state sync ────────────────────────
function updateAgentBadge(status) {
  const badge = document.getElementById('agent-badge');
  if (badge) {
    if (status.running) {
      badge.textContent = status.formatted || (status.elapsedSeconds + 's');
      badge.className = 'card-badge running';
    } else {
      badge.textContent = 'Not running';
      badge.className = 'card-badge stopped';
    }
  }
  if (status.running && (orbState === 'recording' || orbState === 'transcribing' || orbState === 'idle')) {
    clearOrbTimers();
    setOrbState('agent_working');
  } else if (!status.running && orbState === 'agent_working') {
    setOrbState('idle');
  }
}

// ── Notification bubbles ─────────────────────────────────────
const MAX_NOTIFS = 3;
let notifQueue = [];

function showNotification(data) {
  // Scan effect
  const scan = document.getElementById('scan-line');
  scan.classList.remove('active');
  void scan.offsetWidth;
  scan.classList.add('active');

  const container = document.getElementById('notif-container');

  // Create bubble
  const bubble = document.createElement('div');
  bubble.className = 'notif-bubble';

  const time = data.time
    ? new Date(data.time * 1000).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})
    : new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});

  const prio = Math.min(5, Math.max(1, parseInt(data.priority) || 3));
  const tags = (data.tags || []).map(t => `<span class="tag-chip">${t}</span>`).join('');

  bubble.innerHTML = `
    <div class="prio-bar prio-${prio}"></div>
    <div class="notif-header">
      <div class="notif-title">${escHtml(data.title || 'NTFY')}</div>
      <div class="notif-time">${time}</div>
    </div>
    <div class="notif-msg">${escHtml(data.message || '')}</div>
    ${tags ? `<div class="notif-tags">${tags}</div>` : ''}
  `;

  // Position: stack from bottom, max 3
  const positions = [280, 200, 120];
  notifQueue.unshift({ bubble, timer: null });
  if (notifQueue.length > MAX_NOTIFS) {
    const old = notifQueue.pop();
    dismissBubble(old);
  }

  // Reposition all
  notifQueue.forEach((n, i) => {
    n.bubble.style.bottom = positions[i] + 'px';
  });

  container.appendChild(bubble);
  requestAnimationFrame(() => {
    requestAnimationFrame(() => bubble.classList.add('show'));
  });

  // Click to dismiss
  bubble.addEventListener('click', () => {
    const idx = notifQueue.findIndex(n => n.bubble === bubble);
    if (idx !== -1) notifQueue.splice(idx, 1);
    dismissBubble({ bubble });
  });

  // Auto dismiss
  const timer = setTimeout(() => {
    const idx = notifQueue.findIndex(n => n.bubble === bubble);
    if (idx !== -1) notifQueue.splice(idx, 1);
    dismissBubble({ bubble });
  }, 8000);
  notifQueue[0].timer = timer;

  // Orb pulse on new notif
  const orb = document.getElementById('orb-core');
  orb.style.boxShadow = '0 0 80px rgba(0,229,255,1), 0 0 120px rgba(0,229,255,0.8), inset 0 0 20px rgba(0,0,0,0.5)';
  setTimeout(() => { orb.style.boxShadow = ''; }, 1000);
}

function dismissBubble({ bubble, timer }) {
  if (timer) clearTimeout(timer);
  bubble.classList.remove('show');
  bubble.classList.add('hide');
  setTimeout(() => bubble.remove(), 600);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Connection dot ────────────────────────────────────────────
function setConnected(ok) {
  const dot = document.getElementById('conn-dot');
  dot.className = ok ? 'connected' : 'error';
}

// ── IPC handlers for model selection ─────────────────────────────
if (window.jarvis) {
  // Handle get-selected-model request from main process
  window.electronAPI?.onGetSelectedModel?.(() => {
    return selectedModel;
  });
  
  window.electronAPI?.onSetSelectedModel?.((model) => {
    selectModel(model);
  });
}

// Also handle toggle state sync
if (window.electronAPI) {
  window.electronAPI?.onToggleStates?.((states) => {
    if (states.omoEnabled !== undefined && localStorage.getItem('omoEnabled') === null) {
      omoEnabled = states.omoEnabled;
      const toggle = document.getElementById('omo-toggle');
      if (omoEnabled) {
        toggle.classList.add('enabled');
      } else {
        toggle.classList.remove('enabled');
      }
    }
    if (states.ulwEnabled !== undefined && localStorage.getItem('ulwMode') === null) {
      ulwMode = states.ulwEnabled;
      const toggle = document.getElementById('ralph-toggle');
      const label = document.getElementById('ralph-ulw-label');
      if (ulwMode) {
        toggle.classList.add('ulw-mode');
        label.textContent = 'ULW';
      } else {
        toggle.classList.remove('ulw-mode');
        label.textContent = 'RALPH';
      }
    }
    console.log('Toggle states synced:', states);
  
  // Initialize cron state from actual crontab
  if (states.cronEnabled !== undefined) {
    initCronFromState(states.cronEnabled, states.cronInterval);
  }
});
  
  // Request initial toggle states
  window.electronAPI?.send('get-toggle-states');
}

// Also handle via direct IPC if available
if (window.require) {
  const { ipcRenderer } = window.require('electron');
  
  ipcRenderer.on('get-selected-model', () => {
    ipcRenderer.send('selected-model', selectedModel);
  });
  
  ipcRenderer.on('set-selected-model', (event, model) => {
    selectModel(model);
  });
}
if (window.jarvis) {
  window.jarvis.onConfig(cfg => renderConfig(cfg));
  window.jarvis.onMessage(msg => {
    setConnected(true);
    showNotification(msg);
  });
  window.jarvis.onAgentStatus(updateAgentBadge);
  window.jarvis.onStatusLiveToggle((enabled) => {
    console.log('Status live toggled:', enabled);
    const contextBadges = document.getElementById('context-badges');
    if (contextBadges) {
      contextBadges.style.display = enabled ? 'flex' : 'none';
    }
  });
  window.jarvis.onVoiceTriggerToggle((enabled) => {
    console.log('Voice trigger toggled:', enabled);
    const debugText = document.getElementById('debug-text');
    if (debugText) {
      debugText.textContent = enabled ? 'Voice ON' : 'Voice OFF';
    }
  });
  window.jarvis.onOpencodeContext((context) => {
    console.log('OpenCode context received:', context);
    const panel = document.getElementById('context-panel');
    if (panel) {
      panel.style.display = 'block';
    }
    const memEl = document.getElementById('context-memory');
    if (memEl && context.memory) {
      memEl.textContent = context.memory.substring(0, 200) + '...';
    }
    const bizEl = document.getElementById('context-business');
    if (bizEl && context.business) {
      bizEl.textContent = context.business.substring(0, 150) + '...';
    }
    const statusEl = document.getElementById('oc-running');
    if (statusEl) {
      statusEl.textContent = context.running ? '● Running' : '● Idle';
      statusEl.style.color = context.running ? 'var(--green)' : 'var(--red)';
    }
  });
  window.jarvis.getConfig();
}

// Close button
document.getElementById('btn-close').addEventListener('click', () => {
  window.jarvis?.hideWindow();
});

// Orb click (core or wrapper/rings) = start dictate or stop recording
// Voice trigger ALWAYS works - can add tasks even when agent is running
function handleOrbClick(e) {
  e.stopPropagation();
  if (orbState === 'recording') {
    stopRecordingAndGoIdle();
    return;
  }
  // Don't block if agent is working - user should ALWAYS be able to add tasks via voice
  // if (orbState !== 'idle') return;
  startRecordingPhase();
  window.jarvis?.executeCommand();
}

// Mini orb click - direct oh-my-opencode execution with hardcoded prompt
function handleMiniOrbClick(e) {
  e.stopPropagation();
  console.log('[MINI-ORB] Clicked');
  console.log('[MINI-ORB] window.jarvis exists:', !!window.jarvis);
  window.jarvis?.executeMiniCommand();
}
document.getElementById('orb-wrapper').addEventListener('click', handleOrbClick);
document.getElementById('orb-core').addEventListener('click', handleOrbClick);

if (window.jarvis) {
  window.jarvis.onRecordingStarted(() => {
    if (orbState === 'idle') startRecordingPhase();
  });
  window.jarvis.onRecordingStopped(() => {
    if (orbState === 'recording') stopRecordingAndGoIdle();
  });
}

window.addEventListener('load', () => {
  setTimeout(() => document.getElementById('app').classList.add('visible'), 250);

});
